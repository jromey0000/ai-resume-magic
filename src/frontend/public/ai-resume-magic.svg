<svg width="420" height="64" viewBox="0 0 420 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AI Resume Magic</title>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#74B6DA"/>
      <stop offset="100%" stop-color="#D030D8"/>
    </linearGradient>
    <linearGradient id="docGradient" x1="16" y1="8" x2="48" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="80" y1="32" x2="420" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#74B6DA"/>
      <stop offset="100%" stop-color="#D030D8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon -->
  <g>
    <!-- Background rounded square -->
    <rect width="64" height="64" rx="14" fill="url(#bgGradient)"/>
    
    <!-- Document shape with folded corner -->
    <path d="M18 12 L40 12 L48 20 L48 52 C48 53.1046 47.1046 54 46 54 L20 54 C18.8954 54 18 53.1046 18 52 L18 12 Z" fill="url(#docGradient)"/>
    <path d="M40 12 L40 18 C40 19.1046 40.8954 20 42 20 L48 20 L40 12 Z" fill="#e2e8f0"/>
    
    <!-- Resume lines -->
    <rect x="24" y="26" width="18" height="2.5" rx="1.25" fill="#74B6DA"/>
    <rect x="24" y="32" width="14" height="2" rx="1" fill="#94a3b8"/>
    <rect x="24" y="37" width="16" height="2" rx="1" fill="#94a3b8"/>
    <rect x="24" y="42" width="12" height="2" rx="1" fill="#94a3b8"/>
    <rect x="24" y="47" width="15" height="2" rx="1" fill="#94a3b8"/>
    
    <!-- AI sparkle/magic elements -->
    <g filter="url(#glow)">
      <path d="M52 8 L53.5 12 L52 16 L50.5 12 Z" fill="white"/>
      <path d="M48 12 L52 13.5 L56 12 L52 10.5 Z" fill="white"/>
      <path d="M10 48 L11.2 51 L10 54 L8.8 51 Z" fill="white"/>
      <path d="M7 51 L10 52.2 L13 51 L10 49.8 Z" fill="white"/>
      <circle cx="8" cy="18" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="56" cy="46" r="1.5" fill="white" opacity="0.8"/>
    </g>
    
    <!-- AI circuit dot -->
    <circle cx="22" cy="22" r="1.5" fill="#D030D8"/>
    <circle cx="22" cy="22" r="3" fill="none" stroke="#D030D8" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Text: RESUME MAGIC -->
  <text x="80" y="44" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="url(#textGradient)">
    RESUME MAGIC
  </text>
</svg>
